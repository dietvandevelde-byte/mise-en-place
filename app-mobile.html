<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Mise en Place — Mobiel</title>
<link rel="stylesheet" href="styles/tokens.css?v=57">
<link rel="stylesheet" href="styles/app.css?v=57">
<link rel="stylesheet" href="styles/screens.css?v=57">
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; }
  body { background: #FBF7F0; font-family: "Hanken Grotesk", sans-serif; }
  #root { width: 100%; height: 100%; }

  /* Floating import button — mobiel: linksboven in receptenscherm */
  #btn-scraper {
    position: fixed; bottom: 80px; right: 16px; z-index: 500;
    background: #CF6238; color: #fff; border: none; border-radius: 50%;
    width: 52px; height: 52px; font-size: 22px;
    cursor: pointer; box-shadow: 0 4px 16px -4px rgba(207,98,56,.55);
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, transform .15s;
  }
  #btn-scraper:hover { background: #b5522e; transform: scale(1.08); }
  #btn-scraper title { display: none; }
</style>
</head>
<body>

<div id="root"></div>

<!-- Floating AI import button -->
<button id="btn-scraper" onclick="window.openScraper()" title="Recept importeren">🤖</button>

<!-- API bridge -->
<script src="js/api.js"></script>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- Data + store -->
<script src="js/data.js?v=57"></script>
<script src="js/store.js?v=57"></script>

<!-- App JSX -->
<script type="text/babel" src="js/icons.jsx?v=57"></script>
<script type="text/babel" src="js/components.jsx?v=57"></script>
<script type="text/babel" src="js/slot-editor.jsx?v=57"></script>
<script type="text/babel" src="js/screens-today.jsx?v=57"></script>
<script type="text/babel" src="js/screens-week.jsx?v=57"></script>
<script type="text/babel" src="js/screens-groceries.jsx?v=57"></script>
<script type="text/babel" src="js/screens-recipes.jsx?v=57"></script>
<script type="text/babel" src="js/screens-profile.jsx?v=57"></script>
<script type="text/babel" src="js/share.jsx?v=57"></script>
<script type="text/babel" src="js/app.jsx?v=57"></script>

<script>
  window._mpMountApp = function () {
    window.mountMP(document.getElementById("root"), "mobile");
  };
</script>

<!-- Auth overlay + scraper modal -->
<script src="js/auth-ui.js"></script>

</body>
</html>
