<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Mise en Place — Mobiel</title>
<link rel="stylesheet" href="styles/tokens.css?v=57">
<link rel="stylesheet" href="styles/app.css?v=57">
<link rel="stylesheet" href="styles/screens.css?v=57">
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; }
  body { background: #FBF7F0; font-family: "Hanken Grotesk", sans-serif; }
  #root { width: 100%; height: 100%; }

  /* User badge — rechtsboven */
  #user-badge {
    position: fixed; top: 12px; right: 12px; z-index: 500;
    background: rgba(255,255,255,.9); backdrop-filter: blur(8px);
    border: 1px solid #EDE7DC; border-radius: 999px;
    padding: 5px 12px 5px 6px; font-size: 12px; font-weight: 600;
    color: #5C554B; display: none; align-items: center; gap: 7px;
    box-shadow: 0 2px 10px -4px rgba(33,30,26,.15);
  }
  #user-badge .av {
    width: 24px; height: 24px; border-radius: 50%;
    background: #2F7D4F; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800;
  }
  #user-badge button {
    background: none; border: none; cursor: pointer;
    font-size: 10px; color: #938A7C; font-family: inherit; font-weight: 600;
    padding: 2px 6px; border-radius: 6px; border: 1px solid #DDD7CC;
  }
</style>
</head>
<body>

<div id="user-badge">
  <div class="av" id="ub-av">?</div>
  <span id="ub-name">…</span>
  <button onclick="window._authLogout()">Uitloggen</button>
</div>

<div id="root"></div>

<!-- API bridge -->
<script src="js/api.js"></script>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- Data + store -->
<script src="js/data.js?v=57"></script>
<script src="js/store.js?v=57"></script>

<!-- App JSX -->
<script type="text/babel" src="js/icons.jsx?v=57"></script>
<script type="text/babel" src="js/components.jsx?v=57"></script>
<script type="text/babel" src="js/slot-editor.jsx?v=57"></script>
<script type="text/babel" src="js/screens-today.jsx?v=57"></script>
<script type="text/babel" src="js/screens-week.jsx?v=57"></script>
<script type="text/babel" src="js/screens-groceries.jsx?v=57"></script>
<script type="text/babel" src="js/screens-recipes.jsx?v=57"></script>
<script type="text/babel" src="js/screens-profile.jsx?v=57"></script>
<script type="text/babel" src="js/share.jsx?v=57"></script>
<script type="text/babel" src="js/app.jsx?v=57"></script>

<script>
  window._mpMountApp = function () {
    const user = window.MPAPI.user;
    if (user) {
      const badge = document.getElementById("user-badge");
      badge.style.display = "flex";
      document.getElementById("ub-av").textContent   = user.name[0].toUpperCase();
      document.getElementById("ub-name").textContent = user.name;
    }
    window.mountMP(document.getElementById("root"), "mobile");
  };
</script>

<!-- Auth overlay + scraper modal -->
<script src="js/auth-ui.js"></script>

</body>
</html>
