<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wachtwoord herstellen — Mise en Place</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
         padding: 24px; background: #E7E1D5; font-family: "Hanken Grotesk", system-ui, sans-serif; }
  .card { background: #fff; border-radius: 20px; box-shadow: 0 8px 40px -8px rgba(33,30,26,.18);
           width: 100%; max-width: 400px; padding: 36px; }
  .logo { width: 48px; height: 48px; border-radius: 14px; background: #2F7D4F; color: #fff;
          display: grid; place-items: center; margin-bottom: 16px;
          box-shadow: 0 4px 14px -4px rgba(47,125,79,.5); }
  h1 { font-size: 22px; font-weight: 800; color: #211E1A; margin: 0 0 4px; letter-spacing: -.02em; }
  p  { font-size: 13px; color: #6B655C; margin: 0 0 24px; font-weight: 500; }
  label { display: block; font-size: 12px; font-weight: 700; color: #5C554B; margin-bottom: 5px; }
  input { width: 100%; padding: 10px 13px; border: 1.5px solid #DDD7CC; border-radius: 10px;
          font-size: 14px; font-family: inherit; color: #211E1A; background: #FDFBF8;
          margin-bottom: 14px; outline: none; transition: border-color .14s; }
  input:focus { border-color: #2F7D4F; }
  button { width: 100%; padding: 11px; border-radius: 10px; border: none; background: #2F7D4F;
           color: #fff; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; }
  button:disabled { opacity: .6; cursor: not-allowed; }
  #msg { font-size: 13px; font-weight: 600; min-height: 20px; margin-bottom: 10px; }
  #msg.ok  { color: #2F7D4F; }
  #msg.err { color: #C0392B; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="currentColor" width="26" height="26"><path d="M5 19C4 11 9 5 19 5c0 10-6 15-14 14z"/></svg>
  </div>
  <h1>Nieuw wachtwoord</h1>
  <p>Stel hieronder een nieuw wachtwoord in voor je Mise en Place account.</p>

  <div id="form-wrap">
    <label>Nieuw wachtwoord</label>
    <input id="pw1" type="password" placeholder="Minimaal 8 tekens" />
    <label>Bevestig wachtwoord</label>
    <input id="pw2" type="password" placeholder="Herhaal je nieuwe wachtwoord" onkeydown="if(event.key==='Enter')submit()" />
    <div id="msg"></div>
    <button id="btn" onclick="submit()">Wachtwoord opslaan</button>
  </div>

  <div id="done-wrap" style="display:none;text-align:center">
    <div style="font-size:40px;margin-bottom:12px">✅</div>
    <div style="font-weight:700;font-size:16px;color:#211E1A;margin-bottom:8px">Wachtwoord opgeslagen!</div>
    <div style="font-size:13px;color:#6B655C;margin-bottom:20px">Je kunt nu inloggen met je nieuwe wachtwoord.</div>
    <button onclick="location.href='/'">Naar de app</button>
  </div>
</div>

<script>
const BASE = "https://mise-en-place-api-3ah7.onrender.com";
const token = new URLSearchParams(location.search).get("token");

if (!token) {
  document.getElementById("msg").className = "err";
  document.getElementById("msg").textContent = "Ongeldige link — geen token gevonden.";
  document.getElementById("btn").disabled = true;
}

async function submit() {
  const pw1 = document.getElementById("pw1").value;
  const pw2 = document.getElementById("pw2").value;
  const msg = document.getElementById("msg");
  const btn = document.getElementById("btn");
  msg.className = ""; msg.textContent = "";

  if (!pw1 || !pw2) { msg.className = "err"; msg.textContent = "Vul beide velden in."; return; }
  if (pw1 !== pw2)   { msg.className = "err"; msg.textContent = "Wachtwoorden komen niet overeen."; return; }
  if (pw1.length < 8){ msg.className = "err"; msg.textContent = "Minimaal 8 tekens vereist."; return; }

  btn.disabled = true; btn.textContent = "Opslaan…";
  try {
    const res = await fetch(BASE + "/auth/reset-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token, new_password: pw1 }),
    });
    if (!res.ok) {
      const j = await res.json().catch(() => ({}));
      throw new Error(j.detail || "Fout bij opslaan");
    }
    document.getElementById("form-wrap").style.display = "none";
    document.getElementById("done-wrap").style.display = "";
  } catch(e) {
    msg.className = "err"; msg.textContent = e.message;
    btn.disabled = false; btn.textContent = "Wachtwoord opslaan";
  }
}
</script>
</body>
</html>
