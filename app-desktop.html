<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mise en Place</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/favicon.svg">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2F7D4F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mise en Place">
<link rel="stylesheet" href="styles/tokens.css?v=81">

<style>
  html, body { height: 100%; margin: 0; overflow: hidden; }
  body { background: #FBF7F0; font-family: "Hanken Grotesk", sans-serif; }
  #root { width: 100%; height: 100%; }

  /* Floating import button */
  #btn-scraper {
    position: fixed; bottom: 24px; right: 24px; z-index: 500;
    background: #CF6238; color: #fff; border: none; border-radius: 14px;
    padding: 12px 20px; font-size: 14px; font-weight: 700;
    font-family: "Hanken Grotesk", sans-serif;
    cursor: pointer; box-shadow: 0 4px 16px -4px rgba(207,98,56,.5);
    display: flex; align-items: center; gap: 8px;
    transition: background .15s, transform .15s;
  }
  #btn-scraper:hover { background: #b5522e; transform: translateY(-1px); }

</style>
</head>
<body>

<div id="root"></div>

<!-- API bridge -->
<script src="js/api.js"></script>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- Data + store -->
<script src="js/data.js?v=81"></script>
<script src="js/store.js?v=81"></script>

<!-- App JSX -->
<script type="text/babel" src="js/icons.jsx?v=81"></script>
<script type="text/babel" src="js/components.jsx?v=81"></script>
<script type="text/babel" src="js/slot-editor.jsx?v=81"></script>
<script type="text/babel" src="js/screens-today.jsx?v=81"></script>
<script type="text/babel" src="js/screens-week.jsx?v=81"></script>
<script type="text/babel" src="js/screens-groceries.jsx?v=81"></script>
<script type="text/babel" src="js/screens-recipes.jsx?v=81"></script>
<script type="text/babel" src="js/screens-profile.jsx?v=81"></script>
<script type="text/babel" src="js/share.jsx?v=81"></script>
<script type="text/babel" src="js/app.jsx?v=81"></script>

<script>
  // Mount the app after auth succeeds
  window._mpMountApp = function () {
    window.mountMP(document.getElementById("root"), "desktop");
  };
</script>

<!-- Auth overlay + scraper modal -->
<script src="js/auth-ui.js"></script>

</body>
</html>
